<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" width="128" height="128">
  <!-- Calculator body -->
  <rect x="24" y="12" width="80" height="104" rx="12" ry="12"
        fill="none" stroke="currentColor" stroke-width="6"/>

  <!-- Display screen (filled) -->
  <rect x="36" y="24" width="56" height="24" rx="4" ry="4"
        fill="currentColor"/>

  <!-- Binary text on display -->
  <text x="64" y="41" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="13" font-weight="700"
        fill="#fff">1010</text>

  <!-- Button grid: 2 rows x 3 cols, all solid -->
  <!-- Row 1 -->
  <rect x="36" y="58" width="14" height="14" rx="3" fill="currentColor"/>
  <rect x="57" y="58" width="14" height="14" rx="3" fill="currentColor"/>
  <rect x="78" y="58" width="14" height="14" rx="3" fill="currentColor"/>
  <!-- Row 2 -->
  <rect x="36" y="78" width="14" height="14" rx="3" fill="currentColor"/>
  <rect x="57" y="78" width="14" height="14" rx="3" fill="currentColor"/>
  <rect x="78" y="78" width="14" height="14" rx="3" fill="currentColor"/>

  <!-- Bottom long key (= key) -->
  <rect x="36" y="98" width="56" height="10" rx="3" fill="currentColor"/>
</svg>
