name: Build Windows + Android

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' || github.event_name == 'pull_request' }}

permissions:
  contents: write   # 用于创建 Release

jobs:
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build portable .exe
        run: npm run build

      - name: List build output
        shell: bash
        run: ls -lh dist/

      - name: Upload Windows artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 14

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'android/app/capacitor.build.gradle') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm ci

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # versionCode: 1.0.3 -> 100003, 1.0.10 -> 100010, 1.1.0 -> 101000（避免 1.0.10/1.1.0 碰撞）
          VERSION_CODE=$(echo "$VERSION" | awk -F. '{ printf "%d%03d%03d", $1, $2, $3 }')
          echo "versionName=$VERSION  versionCode=$VERSION_CODE"
          cd android
          ./gradlew assembleDebug --no-daemon \
            -PversionName="$VERSION" \
            -PversionCode="$VERSION_CODE"

      - name: Rename APK to product name
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mv "android/app/build/outputs/apk/debug/app-debug.apk" \
             "android/app/build/outputs/apk/debug/SubnetCalculator-${VERSION}.apk"
          ls -lh android/app/build/outputs/apk/debug/

      - name: Upload Android artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create GitHub Release
    needs: [build-windows, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        # release job 需要源码（docs/releases/ 下的 release notes 文件），
        # build-android/build-windows 已 checkout，但每个 job 独立环境，release 必须自己 checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd artifacts
          find . -type f \( -name '*.exe' -o -name '*.apk' \) -exec sha256sum {} \; > SHA256SUMS
          cat SHA256SUMS

      - name: Resolve release notes body
        id: read-body
        shell: bash
        run: |
          # 从 tag 推断 release notes 路径，例如 v1.0.4 -> docs/releases/v1.0.4.zh-CN.md
          TAG="${GITHUB_REF_NAME}"
          BODY_PATH="docs/releases/${TAG}.zh-CN.md"
          if [ -f "$BODY_PATH" ]; then
            echo "body_path=${BODY_PATH}" >> "$GITHUB_OUTPUT"
            echo "✅ Found release notes: $BODY_PATH ($(wc -c < "$BODY_PATH") bytes)"
          else
            echo "body_path=" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Release notes not found: $BODY_PATH (will use auto-generated notes)"
          fi

      - name: Create Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.apk
            artifacts/SHA256SUMS
          body_path: ${{ steps.read-body.outputs.body_path }}
          generate_release_notes: ${{ steps.read-body.outputs.body_path == '' }}
          draft: false
          prerelease: false

      - name: Verify and patch release body if missing
        # softprops/action-gh-release@v2 在 generate_release_notes:false + body_path
        # 组合下偶尔 body 不写入（v1.0.4 实测过）。这里加保险：release 创建后
        # 检查 body，空就用 gh api 从原文件 PATCH 回去
        if: steps.read-body.outputs.body_path != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          BODY_PATH: ${{ steps.read-body.outputs.body_path }}
          REPO: ${{ github.repository }}
        run: |
          echo "Verifying release body for tag $TAG..."
          sleep 3
          RELEASE_ID=$(gh api "repos/${REPO}/releases/tags/${TAG}" | jq -r '.id // empty')
          if [ -z "$RELEASE_ID" ]; then
            echo "❌ Could not find release for tag $TAG"
            exit 1
          fi
          CURRENT_BODY=$(gh api "repos/${REPO}/releases/${RELEASE_ID}" | jq -r '.body // empty')
          if [ -z "$CURRENT_BODY" ]; then
            echo "⚠️  Release body is empty, patching from $BODY_PATH"
            # 用 jq --arg 安全构造 JSON（自动转义）
            PAYLOAD=$(jq -n --arg body "$(cat "$BODY_PATH")" '{body: $body}')
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "repos/${REPO}/releases/${RELEASE_ID}" \
              --input - <<< "$PAYLOAD"
            echo "✅ Release body patched"
          else
            echo "✅ Release body already present (${#CURRENT_BODY} chars), no patch needed"
          fi