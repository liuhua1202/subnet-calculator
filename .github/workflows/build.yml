name: Build Windows + Android

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # 用于创建 Release

jobs:
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build portable .exe
        run: npm run build

      - name: List build output
        shell: bash
        run: ls -lh dist/

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 14

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Rename APK to product name
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             "android/app/build/outputs/apk/debug/SubnetCalculator-${VERSION}.apk"
          ls -lh android/app/build/outputs/apk/debug/

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create GitHub Release
    needs: [build-windows, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        shell: bash
        run: find artifacts -type f -exec ls -lh {} \;

      - name: Create Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false